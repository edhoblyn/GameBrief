<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a27"/>
  <!-- Purple glow accent -->
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- GB monogram -->
  <text
    x="256"
    y="256"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="264"
    font-weight="800"
    fill="#7c5cfc"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-8"
  >GB</text>
</svg>
